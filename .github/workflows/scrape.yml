name: Proxy Scraper Bot

on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes (GitHub maximum frequency)
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit changes back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Proxy Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TARGET_GROUP_ID: ${{ secrets.TARGET_GROUP_ID }}
        run: python bot.py

      - name: Commit sent_proxies.txt
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add sent_proxies.txt
          # Only commit and push if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update sent proxies list" && git push)
